<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#FAFBFC"/>

  <!-- 左侧装饰色块 -->
  <rect x="0" y="0" width="8" height="630" fill="#3A5FFF"/>

  <!-- Logo 区域 -->
  <g transform="translate(100, 165)">
    <!-- X 字形 Logo -->
    <path d="M0 0 L62.5 0 L162.5 300 L100 300 Z" fill="#141414"/>
    <path d="M100 0 L200 0 L37.5 300 L-62.5 300 Z" fill="#3A5FFF"/>
  </g>

  <!-- 网站名称 -->
  <text x="380" y="230" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#141414">
    X-Utils
  </text>

  <!-- 副标题 -->
  <text x="380" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#666666">
    实用在线工具箱
  </text>

  <!-- 分隔线 -->
  <line x1="380" y1="320" x2="580" y2="320" stroke="#3A5FFF" stroke-width="3"/>

  <!-- 工具标签 -->
  <g transform="translate(380, 360)" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" fill="#666666">
    <text x="0" y="0">JSON格式化</text>
    <text x="140" y="0">·</text>
    <text x="160" y="0">时间戳</text>
    <text x="260" y="0">·</text>
    <text x="280" y="0">编码转换</text>
    <text x="400" y="0">·</text>
    <text x="420" y="0">文本对比</text>
  </g>

  <g transform="translate(380, 400)" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" fill="#666666">
    <text x="0" y="0">UUID生成</text>
    <text x="120" y="0">·</text>
    <text x="140" y="0">哈希计算</text>
    <text x="260" y="0">·</text>
    <text x="280" y="0">二维码</text>
    <text x="380" y="0">·</text>
    <text x="400" y="0">密码生成</text>
  </g>

  <!-- 底部网址 -->
  <text x="100" y="580" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" fill="#999999">
    xutils.net
  </text>

  <!-- 右下角装饰 -->
  <rect x="1192" y="0" width="8" height="630" fill="#3A5FFF"/>
</svg>
